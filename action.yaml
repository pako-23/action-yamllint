---
name: yamllint
description: Run yamllint
author: pako-23 <pasqualepolverino98@gmail.com>
branding:
  icon: shield
  color: blue
inputs:
  files:
    description: Files or directories to check
    default: .
    required: false
  working_directory:
    description: >
      The directory where to run yamllint from.
      Default is `github.workspace`
    default: ''
    required: false
runs:
  using: composite
  steps:
    - name: Process working directory
      id: inputs
      shell: bash
      run: |
        if [[ -n "${{ inputs.working_directory }}" ]]; then
          echo "working_directory=${{ inputs.working_directory }}" \
            >> $GITHUB_OUTPUT
        else
          echo "working_directory=${{ github.workspace }}" \
            >> $GITHUB_OUTPUT
        fi

    - name: Install yamllint
      shell: bash
      run: pip install yamllint

    - name: Run yamllint
      shell: bash
      working-directory: ${{ steps.inputs.outputs.working_directory }}
      run: yamllint ${{ inputs.files }}
